<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="styles.css"><title>囤囤 TunNest</title></head><body><main class="shell">
  <div class="top-row"><div class="brand"><span class="brand-mark">T</span>囤囤 TunNest</div><button id="settings" class="link">设置</button></div>
  <section class="hero"><div class="eyebrow">SAVE ONCE · READ ANYWHERE</div><h1>把喜欢的内容，<br>安静地收进 Notion。</h1><p>本机读取，直接同步，没有内容中转。</p></section>
  <section class="card"><div id="licenseStatus" class="status-row"><span class="dot"></span><span>正在验证订阅</span></div><div id="notionStatus" class="status-row" style="margin-top:9px"><span class="dot"></span><span>正在检查 Notion</span></div></section>
  <section id="paywall" class="card paywall hidden"><div id="paywallTitle" class="eyebrow">7 天完整试用已结束</div><h2>继续囤下值得留下的内容。</h2><p class="hint">付费后立即恢复全部同步；已写入 Notion 的内容永远属于你。</p><button id="upgrade" class="primary">查看订阅方案</button></section>
  <section class="grid"><button class="source-button" data-source="clip">剪藏当前网页</button><button class="source-button" data-source="weread">同步微信读书</button><button class="source-button" data-source="douban">同步豆瓣</button><button class="source-button" data-source="weibo">同步微博</button></section>
  <section id="syncProgress" class="card sync-progress hidden"><div class="top-row"><span id="progressTitle">正在同步</span><span class="progress-actions"><span id="progressCount" class="eyebrow"></span><button id="cancelSync" class="sync-stop">停止</button></span></div><div class="progress-track"><div id="progressBar" class="progress-bar"></div></div><div id="progressDetail" class="hint"></div></section>
  <section class="card"><div class="eyebrow">最近运行</div><div id="history"><div class="history"><span>暂无记录</span></div></div></section><div id="toast" class="toast"></div>
</main><script type="module" src="popup.js"></script></body></html>
