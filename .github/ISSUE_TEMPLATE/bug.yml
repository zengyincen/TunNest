name: Bug report
description: 报告可复现的问题，请勿粘贴任何 Token、Cookie 或许可证
title: "[Bug] "
labels: [bug]
body:
  - type: dropdown
    id: source
    attributes:
      label: 来源
      options: [浏览器扩展, 微信读书, 豆瓣, 微博, Notion, 许可证, GitHub Actions]
    validations: { required: true }
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请删除所有敏感字段
    validations: { required: true }
  - type: input
    id: version
    attributes: { label: 扩展版本 }
    validations: { required: true }
