name: TunNest CI
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24 }
      - run: npm ci
      - run: npm test
      - run: npm run check
      - run: npm run package
      - name: Verify license worker
        run: npm ci && npm run check
        working-directory: license-worker
