<svg width="1280" height="520" viewBox="0 0 1280 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="82" y1="28" x2="1190" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101114"/>
      <stop offset="0.55" stop-color="#1B1C21"/>
      <stop offset="1" stop-color="#111217"/>
    </linearGradient>
    <linearGradient id="blue" x1="730" y1="62" x2="1100" y2="448" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7CC4FF"/>
      <stop offset="1" stop-color="#0A84FF"/>
    </linearGradient>
    <linearGradient id="cream" x1="820" y1="90" x2="1000" y2="332" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFDF7"/>
      <stop offset="1" stop-color="#F2EEE4"/>
    </linearGradient>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
    <style>
      .sans{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC","PingFang SC",sans-serif}
    </style>
  </defs>

  <rect width="1280" height="520" rx="42" fill="url(#bg)"/>
  <circle cx="1134" cy="110" r="140" fill="#0A84FF" fill-opacity="0.18" filter="url(#blur)"/>
  <circle cx="754" cy="472" r="130" fill="#E7C99E" fill-opacity="0.12" filter="url(#blur)"/>

  <g class="sans">
    <g transform="translate(72 62)">
      <rect width="48" height="48" rx="14" fill="#F5F5F7"/>
      <path d="M11 13H37V19H27V32H21V19H11V13Z" fill="#1D1D1F"/>
      <path d="M13 31C18 37 30 37 35 31" stroke="#0A84FF" stroke-width="3" stroke-linecap="round"/>
      <text x="64" y="31" fill="#F5F5F7" font-size="21" font-weight="650" letter-spacing="1.2">囤囤 · TUNNEST</text>
    </g>

    <text x="72" y="203" fill="white" font-size="54" font-weight="720" letter-spacing="-1">把散落的喜欢，</text>
    <text x="72" y="272" fill="white" font-size="54" font-weight="720" letter-spacing="-1">收进自己的数字巢穴。</text>
    <text x="74" y="328" fill="#AEB0B8" font-size="22" font-weight="430">微信读书 · 豆瓣 · 微博 · 网页剪藏 → 你的 Notion</text>

    <g transform="translate(72 378)">
      <rect width="192" height="52" rx="26" fill="white"/>
      <circle cx="28" cy="26" r="6" fill="#30D158"/>
      <text x="45" y="33" fill="#1D1D1F" font-size="17" font-weight="650">7 天完整试用</text>
      <rect x="208" width="214" height="52" rx="26" fill="#FFFFFF" fill-opacity="0.09" stroke="#FFFFFF" stroke-opacity="0.12"/>
      <path d="M235 27L241 33L253 20" stroke="#7CC4FF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="269" y="33" fill="#F5F5F7" font-size="17" font-weight="560">内容直达 Notion</text>
    </g>

    <g filter="url(#shadow)">
      <g transform="translate(791 62) rotate(6 154 104)">
        <rect width="308" height="208" rx="28" fill="url(#blue)"/>
        <circle cx="38" cy="39" r="14" fill="white" fill-opacity="0.26"/>
        <text x="64" y="47" fill="white" font-size="18" font-weight="650">微博收藏</text>
        <text x="28" y="105" fill="white" font-size="26" font-weight="680">喜欢的博文，</text>
        <text x="28" y="139" fill="white" font-size="26" font-weight="680">不再消失在时间线。</text>
        <text x="28" y="180" fill="white" fill-opacity="0.72" font-size="15">保存到自己的 Notion</text>
      </g>

      <g transform="translate(694 181) rotate(-8 154 104)">
        <rect width="308" height="208" rx="28" fill="url(#cream)"/>
        <rect x="26" y="24" width="38" height="38" rx="12" fill="#1D1D1F"/>
        <path d="M37 33H53V37H47V49H43V37H37V33Z" fill="white"/>
        <text x="77" y="50" fill="#1D1D1F" font-size="18" font-weight="650">微信读书</text>
        <text x="26" y="109" fill="#1D1D1F" font-size="26" font-weight="700">划线不是终点，</text>
        <text x="26" y="143" fill="#1D1D1F" font-size="26" font-weight="700">沉淀才是。</text>
        <rect x="26" y="170" width="102" height="8" rx="4" fill="#0A84FF" fill-opacity="0.8"/>
        <rect x="138" y="170" width="62" height="8" rx="4" fill="#1D1D1F" fill-opacity="0.12"/>
      </g>

      <g transform="translate(929 282) rotate(5 135 85)">
        <rect width="270" height="170" rx="26" fill="#F8F8FA"/>
        <text x="24" y="43" fill="#86868B" font-size="15" font-weight="620">DOUBAN · 2026</text>
        <text x="24" y="83" fill="#1D1D1F" font-size="22" font-weight="700">电影、书与那些</text>
        <text x="24" y="113" fill="#1D1D1F" font-size="22" font-weight="700">舍不得忘记的感受</text>
        <g fill="#FF9F0A">
          <circle cx="30" cy="143" r="5"/><circle cx="46" cy="143" r="5"/><circle cx="62" cy="143" r="5"/><circle cx="78" cy="143" r="5"/><circle cx="94" cy="143" r="5"/>
        </g>
      </g>
    </g>
  </g>
</svg>
